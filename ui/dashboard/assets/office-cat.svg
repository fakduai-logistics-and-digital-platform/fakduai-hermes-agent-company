<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120" role="img" aria-label="Cute orange office cat">
  <defs>
    <radialGradient id="bodyFur" cx="35%" cy="25%" r="75%">
      <stop offset="0" stop-color="#ffe4a3"/>
      <stop offset="0.42" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="faceFur" cx="38%" cy="25%" r="70%">
      <stop offset="0" stop-color="#fff1c2"/>
      <stop offset="0.55" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="tailFur" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>

  <ellipse cx="83" cy="106" rx="55" ry="9" fill="#020617" opacity=".25"/>

  <g filter="url(#softShadow)">
    <!-- curled tail behind body -->
    <path d="M38 82C7 72 12 37 37 38c18 1 24 23 8 34" fill="none" stroke="url(#tailFur)" stroke-width="17" stroke-linecap="round"/>
    <path d="M37 82C8 73 14 42 36 43c13 .5 17 16 6 25" fill="none" stroke="#fef3c7" stroke-width="4" stroke-linecap="round" opacity=".35"/>

    <!-- body loaf -->
    <path d="M38 78c0-24 20-43 48-43 29 0 50 19 50 43 0 21-17 32-49 32-33 0-49-11-49-32z" fill="url(#bodyFur)" stroke="#78350f" stroke-width="4"/>
    <path d="M49 80c5 16 19 22 38 22 20 0 34-6 39-22" fill="none" stroke="#92400e" stroke-width="3" opacity=".25" stroke-linecap="round"/>

    <!-- ears -->
    <path d="M55 46 47 15l28 20z" fill="#f59e0b" stroke="#78350f" stroke-width="4" stroke-linejoin="round"/>
    <path d="M112 46 119 15 92 35z" fill="#f59e0b" stroke="#78350f" stroke-width="4" stroke-linejoin="round"/>
    <path d="M56 37 52 23l13 10z" fill="#fb7185" opacity=".75"/>
    <path d="M111 37 115 23l-13 10z" fill="#fb7185" opacity=".75"/>

    <!-- face mask -->
    <ellipse cx="84" cy="64" rx="40" ry="32" fill="url(#faceFur)" opacity=".95"/>

    <!-- stripes -->
    <path d="M76 35c2 8 2 14 0 20M84 33c1 9 1 15 0 22M93 35c-2 8-2 14 0 20" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity=".42"/>
    <path d="M48 60c9-3 16-4 23-2M49 70c8-2 15-2 22 0M119 60c-9-3-16-4-23-2M119 70c-8-2-15-2-22 0" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity=".35"/>

    <!-- eyes -->
    <ellipse cx="70" cy="63" rx="6" ry="7" fill="#111827"/>
    <ellipse cx="98" cy="63" rx="6" ry="7" fill="#111827"/>
    <circle cx="68" cy="60" r="2" fill="#f8fafc"/>
    <circle cx="96" cy="60" r="2" fill="#f8fafc"/>

    <!-- cheeks -->
    <circle cx="61" cy="75" r="7" fill="#fb7185" opacity=".26"/>
    <circle cx="107" cy="75" r="7" fill="#fb7185" opacity=".26"/>

    <!-- nose + mouth -->
    <path d="M84 69 78 73h12z" fill="#7c2d12"/>
    <path d="M84 73v5" stroke="#431407" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M76 80c4 5 12 5 16 0" fill="none" stroke="#431407" stroke-width="2.5" stroke-linecap="round"/>

    <!-- whiskers -->
    <path d="M66 72H34M67 79 36 84M101 72h32M101 79l31 5" stroke="#431407" stroke-width="2.3" stroke-linecap="round" opacity=".65"/>

    <!-- paws -->
    <path d="M61 91c4 6 14 7 18 1" fill="none" stroke="#78350f" stroke-width="3" stroke-linecap="round" opacity=".45"/>
    <path d="M90 92c4 6 14 5 18-1" fill="none" stroke="#78350f" stroke-width="3" stroke-linecap="round" opacity=".45"/>

    <!-- tiny badge collar -->
    <path d="M70 89c8 5 21 5 29 0" fill="none" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" opacity=".9"/>
    <circle cx="85" cy="93" r="4" fill="#fde047" stroke="#713f12" stroke-width="1.5"/>
  </g>
</svg>
